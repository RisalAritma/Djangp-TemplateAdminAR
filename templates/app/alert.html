{% extends 'app/base.html' %}

{% block content %}

<form action="" method="post" class="claim-form">
    {% csrf_token %}

    <div class="d-flex flex-wrap gap-2">

        <button type="submit" name="action" value="success" class="btn btn-success">
            <i class="ri-checkbox-circle-line me-1"></i>
            Test Success
        </button>

        <button type="submit" name="action" value="danger" class="btn btn-danger">
            <i class="ri-close-circle-line me-1"></i>
            Test Danger
        </button>

        <button type="submit" name="action" value="warning" class="btn btn-warning">
            <i class="ri-alert-line me-1"></i>
            Test Warning
        </button>

        <button type="submit" name="action" value="info" class="btn btn-info text-white">
            <i class="ri-information-line me-1"></i>
            Test Info
        </button>

    </div>
</form>


<div class="alert2-container">
    {% if messages %}
        {% for message in messages %}
            <div class="alert2 alert2-{{ message.tags }}">
                    <i class="{% if message.tags == 'success' %}ri-checkbox-circle-line{% else %}ri-error-warning-line{% endif %}"></i>
                    {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% if form.errors %}
        <div class="alert2 alert2-error">
                <i class="ri-error-warning-line"></i>
                Username atau password salah!
        </div>
    {% endif %}
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Jalankan fungsi penghilang otomatis untuk semua alert2
        function autoRemove() {
            const alerts = document.querySelectorAll('.alert2');
            alerts.forEach(function(alert) {
                setTimeout(function() {
                    alert.classList.add('fade-out');
                    setTimeout(() => alert.remove(), 500);
                }, 4000);
            });
        }
        autoRemove();
    });
</script>


{% endblock %}
